<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Metro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

/* ─── DESIGN TOKENS ─────────────────────────────────
   Palette inspired by neny.org:
   Navy #0d1f4e · Green #4caf2e · White · Soft grey
   ──────────────────────────────────────────────── */
:root {
  --bg:     #f4f6f9;
  --bg2:    #e8ecf2;
  --bg3:    #dde2ea;
  --glass:  rgba(255,255,255,0.76);
  --glass2: rgba(255,255,255,0.93);
  --label:  #0d1f4e;
  --label2: #1a3060;
  --label3: #5a6a8a;
  --label4: #96a3b8;
  --sep:    rgba(13,31,78,0.10);
  --sep2:   rgba(13,31,78,0.05);
  --accent: #4caf2e;
  --accent2:#3d9424;
}

body.dark {
  --bg:     #080e1c;
  --bg2:    #101828;
  --bg3:    #182030;
  --glass:  rgba(8,14,28,0.88);
  --glass2: rgba(12,20,36,0.96);
  --label:  #eef2ff;
  --label2: #c0ceee;
  --label3: #6e85aa;
  --label4: #3e5070;
  --sep:    rgba(200,218,255,0.10);
  --sep2:   rgba(200,218,255,0.05);
  --accent: #5ccf38;
  --accent2:#4ab82e;
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--label);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  transition: background 0.35s, color 0.35s;
}

/* ─── NAVBAR ──────────────────────────────────────── */
nav {
  position: fixed; top:0; left:0; right:0; z-index:200;
  height: 48px;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 0.5px solid var(--sep);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}

.nav-brand { display:flex; align-items:center; gap:8px; }
.nav-title  { font-size:15px; font-weight:600; letter-spacing:-0.3px; color:var(--label); }
.nav-sep    { width:1px; height:12px; background:var(--sep); }
.nav-sub    { font-size:12px; color:var(--label3); font-weight:400; }
.nav-right  { display:flex; align-items:center; gap:6px; }

.pill-search {
  display:flex; align-items:center; gap:6px;
  height:30px; padding:0 10px;
  background:var(--bg2); border:0.5px solid var(--sep);
  border-radius:10px; transition:all 0.2s;
}
.pill-search svg { color:var(--label4); flex-shrink:0; }
.pill-search input {
  background:none; border:none; outline:none;
  font-family:inherit; font-size:13px;
  color:var(--label); width:160px; transition:width 0.3s;
}
.pill-search input::placeholder { color:var(--label4); }
.pill-search input:focus         { width:210px; }
.pill-search:focus-within {
  border-color:rgba(76,175,46,0.5);
  box-shadow:0 0 0 3px rgba(76,175,46,0.1);
}

.nav-btn {
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg2); border:0.5px solid var(--sep);
  border-radius:9px; cursor:pointer; color:var(--label3);
  transition:background 0.15s, color 0.15s;
}
.nav-btn:hover { background:var(--bg3); color:var(--label); }
.nav-btn.on    { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ─── MAP STAGE ──────────────────────────────────── */
.stage {
  position:fixed; inset:48px 0 0 0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

.wheel-wrap {
  position:relative;
  width: min(84vmin, 820px);
  height:min(84vmin, 820px);
}

.svg-layer {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; overflow:visible;
}

/* ─── DOM OVERLAY LAYERS ─────────────────────────── */
#ringLabels, #catLabels {
  position:absolute; inset:0; pointer-events:none;
}
#stationsLayer {
  position:absolute; inset:0; pointer-events:all;
}

/* ─── RING LEVEL BADGES ──────────────────────────── */
.rlabel {
  position:absolute; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  pointer-events:none;
}
.rlabel-pill {
  padding:3px 10px; border-radius:100px;
  font-size:9px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase;
  white-space:nowrap;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:0.5px solid;
}
/* Light */
.rlabel-pill.entry  { background:rgba(76,175,46,0.12);  border-color:rgba(76,175,46,0.40);  color:#2d7a14; }
.rlabel-pill.mid    { background:rgba(26,74,191,0.10);  border-color:rgba(26,74,191,0.35);  color:#1a4abf; }
.rlabel-pill.senior { background:rgba(13,31,78,0.10);   border-color:rgba(13,31,78,0.30);   color:#0d1f4e; }
/* Dark */
body.dark .rlabel-pill.entry  { background:rgba(92,207,56,0.12);  border-color:rgba(92,207,56,0.40);  color:#5ccf38; }
body.dark .rlabel-pill.mid    { background:rgba(74,127,255,0.12); border-color:rgba(74,127,255,0.40); color:#7aa0ff; }
body.dark .rlabel-pill.senior { background:rgba(139,168,255,0.10);border-color:rgba(139,168,255,0.35);color:#b0c4ff; }

.rlabel-sub { font-size:9px; color:var(--label4); font-weight:400; }

/* ─── CATEGORY LABELS ────────────────────────────── */
.clabel {
  position:absolute; transform:translate(-50%,-50%);
  font-size:9px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--label4); white-space:nowrap;
  pointer-events:none;
}

/* ─── STATION DOTS ───────────────────────────────── */
.dot {
  position:absolute; cursor:pointer;
  transform:translate(-50%,-50%);
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  z-index:10;
}
.dot:hover, .dot.sel {
  transform:translate(-50%,-50%) scale(1.5);
  z-index:30;
}

.dot-circle {
  border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,0.18), 0 0 0 2.5px var(--bg);
  transition:box-shadow 0.2s;
}

/* Sizes grow entry→mid→senior so progression is obvious */
.dot.entry  .dot-circle { width:10px; height:10px; }
.dot.mid    .dot-circle { width:14px; height:14px; }
.dot.senior .dot-circle { width:18px; height:18px; }

/* Colors: green / navy-blue / deep navy — light mode */
.dot.entry  .dot-circle { background:#4caf2e; }
.dot.mid    .dot-circle { background:#1a4abf; }
.dot.senior .dot-circle { background:#0d1f4e; }

/* Colors: lighter for dark backgrounds */
body.dark .dot.entry  .dot-circle { background:#5ccf38; }
body.dark .dot.mid    .dot-circle { background:#4a7fff; }
body.dark .dot.senior .dot-circle { background:#8ba8ff; }

/* Glow rings on hover / selected */
.dot:hover .dot-circle, .dot.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(26,74,191,0.18), 0 0 0 2.5px var(--bg);
}
.dot.entry:hover .dot-circle,  .dot.entry.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(76,175,46,0.28), 0 0 0 2.5px var(--bg);
}
.dot.senior:hover .dot-circle, .dot.senior.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(13,31,78,0.22), 0 0 0 2.5px var(--bg);
}
body.dark .dot:hover .dot-circle, body.dark .dot.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(74,127,255,0.25), 0 0 0 2.5px var(--bg);
}
body.dark .dot.entry:hover .dot-circle, body.dark .dot.entry.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(92,207,56,0.28), 0 0 0 2.5px var(--bg);
}
body.dark .dot.senior:hover .dot-circle, body.dark .dot.senior.sel .dot-circle {
  box-shadow:0 0 0 5px rgba(139,168,255,0.22), 0 0 0 2.5px var(--bg);
}

/* Tooltip */
.dot-tip {
  position:absolute; bottom:calc(100% + 10px); left:50%;
  transform:translateX(-50%) translateY(4px);
  white-space:nowrap;
  font-size:11px; font-weight:500; color:var(--label);
  background:var(--glass2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  padding:5px 10px; border-radius:8px;
  border:0.5px solid var(--sep);
  box-shadow:0 4px 16px rgba(0,0,0,0.10);
  pointer-events:none; opacity:0;
  transition:opacity 0.15s, transform 0.15s;
}
.dot:hover .dot-tip, .dot.sel .dot-tip {
  opacity:1; transform:translateX(-50%) translateY(0);
}

/* ─── CONNECTION LINES ───────────────────────────── */
.cline {
  fill:none; stroke-width:1.5; opacity:0;
  transition:opacity 0.3s; stroke-linecap:round;
}
.cline.on { opacity:0.85; stroke-width:2; }

.cline.entry  { stroke:#4caf2e; }
.cline.mid    { stroke:#1a4abf; }
.cline.senior { stroke:#0d1f4e; }
body.dark .cline.entry  { stroke:#5ccf38; }
body.dark .cline.mid    { stroke:#4a7fff; }
body.dark .cline.senior { stroke:#8ba8ff; }

/* ─── DETAILS PANEL ──────────────────────────────── */
.panel {
  position:fixed; top:48px; right:-400px; bottom:0;
  width:360px;
  background:var(--glass2);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-left:0.5px solid var(--sep);
  transition:right 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index:150;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.panel.open { right:0; }

.panel-header {
  padding:20px 20px 0; flex-shrink:0; position:relative;
}

.panel-close {
  position:absolute; top:14px; right:14px;
  width:26px; height:26px;
  background:var(--bg3); border:none;
  border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--label3); font-size:15px;
  transition:background 0.15s;
}
.panel-close:hover { background:var(--sep); color:var(--label); }

.panel-badge {
  display:inline-flex; align-items:center;
  font-size:9px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase;
  padding:3px 9px; border-radius:100px;
  margin-bottom:8px; border:0.5px solid;
}
.panel-badge.entry  { background:rgba(76,175,46,0.10);  border-color:rgba(76,175,46,0.35);  color:#2d7a14; }
.panel-badge.mid    { background:rgba(26,74,191,0.08);  border-color:rgba(26,74,191,0.30);  color:#1a4abf; }
.panel-badge.senior { background:rgba(13,31,78,0.08);   border-color:rgba(13,31,78,0.25);   color:#0d1f4e; }
body.dark .panel-badge.entry  { background:rgba(92,207,56,0.10);  border-color:rgba(92,207,56,0.35);  color:#5ccf38; }
body.dark .panel-badge.mid    { background:rgba(74,127,255,0.10); border-color:rgba(74,127,255,0.35); color:#7aa0ff; }
body.dark .panel-badge.senior { background:rgba(139,168,255,0.08);border-color:rgba(139,168,255,0.30);color:#b0c4ff; }

.panel-title {
  font-size:20px; font-weight:700;
  letter-spacing:-0.4px; line-height:1.2;
  color:var(--label); margin-bottom:16px;
}

.panel-divider { height:0.5px; background:var(--sep); margin:0 20px; }

.panel-body {
  flex:1; overflow-y:auto; padding:16px 20px 32px;
}
.panel-body::-webkit-scrollbar { width:4px; }
.panel-body::-webkit-scrollbar-track { background:transparent; }
.panel-body::-webkit-scrollbar-thumb { background:var(--sep); border-radius:2px; }

.prow { margin-bottom:16px; }
.prow-label {
  font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:0.05em;
  color:var(--label4); margin-bottom:4px;
}
.prow p { font-size:13px; line-height:1.55; color:var(--label2); }

.plist { list-style:none; }
.plist li {
  font-size:13px; line-height:1.5; color:var(--label2);
  padding:7px 0; border-bottom:0.5px solid var(--sep2);
  display:flex; align-items:center; gap:6px;
}
.plist li:last-child { border-bottom:none; }
.plist li.link { color:var(--accent); cursor:pointer; }
.plist li.link::before { content:'↗'; font-size:10px; opacity:0.7; flex-shrink:0; }
.plist li.link:hover { text-decoration:underline; }

.skills-wrap { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.skill-chip {
  font-size:11px; padding:3px 9px;
  background:var(--bg2); border:0.5px solid var(--sep);
  border-radius:6px; color:var(--label2);
}

/* ─── FILTER PANEL ───────────────────────────────── */
.fp {
  position:fixed; top:48px; right:-260px; bottom:0;
  width:228px;
  background:var(--glass2);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-left:0.5px solid var(--sep);
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index:149; padding:16px; overflow-y:auto;
}
.fp.open { right:0; }
.fp-head { font-size:12px; font-weight:700; color:var(--label); margin-bottom:14px; }
.fp-section { margin-bottom:16px; }
.fp-section-label {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.07em; color:var(--label4); margin-bottom:6px;
}
.fp-row {
  padding:6px 8px; font-size:13px; cursor:pointer;
  color:var(--label3); border-radius:7px;
  transition:background 0.12s, color 0.12s;
  display:flex; align-items:center; gap:6px;
}
.fp-row:hover { background:var(--bg2); color:var(--label); }
.fp-row.on    { color:var(--accent); font-weight:500; }
.fp-row.on::before {
  content:''; width:6px; height:6px;
  border-radius:50%; background:var(--accent); flex-shrink:0;
}

/* ─── LOADING / STATES ───────────────────────────── */
.loader {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:50;
}
.loader-ring {
  width:28px; height:28px;
  border:2.5px solid var(--sep);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loader-text { font-size:13px; color:var(--label3); }

.err-state {
  position:absolute; inset:0;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
.err-state p { font-size:13px; color:var(--label3); }
.err-btn {
  font-size:13px; padding:7px 16px;
  background:var(--accent); color:#fff;
  border:none; border-radius:9px; cursor:pointer;
  font-family:inherit;
  transition:background 0.15s;
}
.err-btn:hover { background:var(--accent2); }

.empty-msg {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px;
}
.empty-msg h3 { font-size:16px; font-weight:600; color:var(--label); }
.empty-msg p  { font-size:13px; color:var(--label3); max-width:220px; text-align:center; line-height:1.5; }

@media(max-width:640px){ .nav-sub,.nav-sep { display:none; } }
</style>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────── -->
<nav>
  <div class="nav-brand">
    <span class="nav-title">Career Metro</span>
    <div class="nav-sep"></div>
    <span class="nav-sub">Inner → outer = career progression</span>
  </div>
  <div class="nav-right">
    <div class="pill-search">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="5"/><path d="M10.5 10.5l3 3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search roles…">
    </div>
    <button class="nav-btn" id="themeBtn" onclick="toggleTheme()">
      <svg id="iMoon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="iSun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none">
        <circle cx="12" cy="12" r="4.5"/>
        <line x1="12" y1="2"    x2="12" y2="5"/>   <line x1="12" y1="19"   x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/> <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12"   x2="5" y2="12"/>    <line x1="19" y1="12"   x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
      </svg>
    </button>
    <button class="nav-btn" id="filterBtn" onclick="toggleFP()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 4h12M4 8h8M6 12h4"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ── STAGE ──────────────────────────────────────── -->
<div class="stage">
  <div class="wheel-wrap" id="wheelWrap" style="display:none">
    <svg class="svg-layer" id="svgBase"  viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="ringLabels"></div>
    <div id="catLabels"></div>
    <div id="stationsLayer"></div>
    <svg class="svg-layer" id="svgLines" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
         style="pointer-events:none;position:absolute;inset:0;z-index:20"></svg>
  </div>
  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading…</div>
  </div>
  <div class="err-state" id="errState">
    <p>Could not load data</p>
    <button class="err-btn" onclick="loadData()">Retry</button>
  </div>
</div>

<!-- ── FILTER PANEL ───────────────────────────────── -->
<div class="fp" id="fp">
  <div class="fp-head">Filter</div>
  <div class="fp-section">
    <div class="fp-section-label">Level</div>
    <div class="fp-row on" data-f="level" data-v="all"       onclick="setF('level','all')">All levels</div>
    <div class="fp-row"    data-f="level" data-v="Entry"     onclick="setF('level','Entry')">Entry</div>
    <div class="fp-row"    data-f="level" data-v="Mid-Level" onclick="setF('level','Mid-Level')">Mid-Level</div>
    <div class="fp-row"    data-f="level" data-v="Senior"    onclick="setF('level','Senior')">Senior</div>
  </div>
  <div class="fp-section">
    <div class="fp-section-label">Category</div>
    <div class="fp-row on" data-f="category" data-v="all" onclick="setF('category','all')">All categories</div>
    <div id="fpCats"></div>
  </div>
</div>

<!-- ── DETAILS PANEL ──────────────────────────────── -->
<div class="panel" id="panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">×</button>
    <div id="panelTop"></div>
  </div>
  <div class="panel-divider"></div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
const SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ39S2y1A-CLOiFGe2WZrFwj9ZKiN7959oZY2FrnmeluW8dwx3bXFMSzIKZE4EASy0N6B-QuJkH210Q/pub?output=csv';

let roles = [], filtered = [], filt = { level:'all', category:'all', search:'' };
let isDark = false, positions = {};

// ── Radii bands (SVG viewBox 100×100, centre 50,50, edge = 50) ──
const BANDS = {
  entry:  { rMin:5,  rMax:15 },
  mid:    { rMin:22, rMax:33 },
  senior: { rMin:38, rMax:46 }
};

// Ring badge config
const RLABEL = {
  entry:  { r:10, lbl:'Entry',     sub:'Early career' },
  mid:    { r:27, lbl:'Mid-Level', sub:'Growth roles' },
  senior: { r:42, lbl:'Senior',    sub:'Leadership'   }
};

// Pie hues — navy/teal/green family (neny.org inspired), no garish rainbow
// Each number is an HSL hue. Light: pastel at 78% L. Dark: mid-tone at 38% L.
const PIE_HUES = [215, 145, 195, 170, 230, 120, 200, 160, 245, 135, 180, 210];

// ── THEME ────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('iMoon').style.display = isDark ? 'none' : '';
  document.getElementById('iSun').style.display  = isDark ? ''     : 'none';
  if (filtered.length) layout();
}

// ── DATA ─────────────────────────────────────────────
async function loadData() {
  showState('loading');
  try {
    const res = await fetch(SHEET);
    if (!res.ok) throw new Error();
    roles = parseCSV(await res.text());
    if (!roles.length) throw new Error();
    filtered = [...roles];
    buildCatFilters();
    showState('wheel');
    requestAnimationFrame(() => setTimeout(layout, 30));
  } catch {
    showState('error');
  }
}

function showState(s) {
  document.getElementById('loader').style.display    = s === 'loading' ? 'flex'  : 'none';
  document.getElementById('errState').style.display  = s === 'error'   ? 'flex'  : 'none';
  document.getElementById('wheelWrap').style.display = s === 'wheel'   ? 'block' : 'none';
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const hdr = lines[0].split(',');
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = []; let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const row = {};
    hdr.forEach((h, j) => row[h] = vals[j] || '');
    row.connections = row.connections ? row.connections.split(',').map(c => c.trim()).filter(Boolean) : [];
    row.skills      = row.skills      ? row.skills.split(',').map(s => s.trim()).filter(Boolean)      : [];
    if (row.id && row.title) out.push(row);
  }
  return out;
}

function buildCatFilters() {
  const cats = [...new Set(roles.map(r => r.category))].sort();
  document.getElementById('fpCats').innerHTML = cats.map(c =>
    `<div class="fp-row" data-f="category" data-v="${c}" onclick="setF('category','${c}')">${c}</div>`
  ).join('');
}

// ── HELPERS ──────────────────────────────────────────
function hash01(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return (h % 1000) / 1000;
}

function polar(cx, cy, r, a) {
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

function arcSlice(cx, cy, r0, r1, a0, a1) {
  const p1 = polar(cx, cy, r1, a0), p2 = polar(cx, cy, r1, a1);
  const p3 = polar(cx, cy, r0, a1), p4 = polar(cx, cy, r0, a0);
  const laf = a1 - a0 > Math.PI ? 1 : 0;
  return `M${p1.x} ${p1.y} A${r1} ${r1} 0 ${laf} 1 ${p2.x} ${p2.y} `
       + `L${p3.x} ${p3.y} A${r0} ${r0} 0 ${laf} 0 ${p4.x} ${p4.y} Z`;
}

// ── LAYOUT ───────────────────────────────────────────
function layout() {
  const $svg   = document.getElementById('svgBase');
  const $lines = document.getElementById('svgLines');
  const $st    = document.getElementById('stationsLayer');
  const $rl    = document.getElementById('ringLabels');
  const $cl    = document.getElementById('catLabels');

  $svg.innerHTML = $lines.innerHTML = $st.innerHTML = $rl.innerHTML = $cl.innerHTML = '';
  positions = {};

  if (!filtered.length) {
    $st.innerHTML = '<div class="empty-msg"><h3>No matches</h3><p>Adjust your filters or clear the search.</p></div>';
    return;
  }

  const cx = 50, cy = 50;
  const cats = [...new Set(filtered.map(r => r.category).filter(Boolean))];
  const sliceAngle = cats.length ? (2 * Math.PI) / cats.length : 0;

  // ── 1. SVG defs: one radialGradient per category slice ──
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  $svg.appendChild(defs);

  cats.forEach((cat, i) => {
    const hue = PIE_HUES[i % PIE_HUES.length];
    // Light mode: soft pastel (high lightness). Dark: mid-tone (readable, not black).
    const sat  = isDark ? '32%' : '28%';
    const lum  = isDark ? '38%' : '78%';
    const peak = isDark ? '0.80' : '0.62';

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
    g.setAttribute('id', `pg${i}`);
    g.setAttribute('gradientUnits', 'userSpaceOnUse');
    g.setAttribute('cx', cx); g.setAttribute('cy', cy); g.setAttribute('r', '50');

    // Transparent at center → peak color at ~50% radius → transparent at outer edge
    [['0%','0'], ['50%', peak], ['100%','0']].forEach(([offset, opacity]) => {
      const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop.setAttribute('offset', offset);
      stop.setAttribute('stop-color', `hsl(${hue},${sat},${lum})`);
      stop.setAttribute('stop-opacity', opacity);
      g.appendChild(stop);
    });
    defs.appendChild(g);
  });

  // ── 2. Pie slices ──────────────────────────────────
  cats.forEach((cat, i) => {
    const a0 = -Math.PI / 2 + i * sliceAngle;
    const a1 = a0 + sliceAngle;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', arcSlice(cx, cy, 4, 49, a0, a1));
    path.style.fill        = `url(#pg${i})`;
    path.style.stroke      = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.75)';
    path.style.strokeWidth = '0.3';
    $svg.appendChild(path);

    // Category label near outer rim
    const lp  = polar(cx, cy, 46.5, (a0 + a1) / 2);
    const lbl = document.createElement('div');
    lbl.className   = 'clabel';
    lbl.textContent = cat;
    lbl.style.left  = lp.x + '%';
    lbl.style.top   = lp.y + '%';
    $cl.appendChild(lbl);
  });

  // ── 3. Ring level badges ────────────────────────────
  const byLevel = { Entry:[], 'Mid-Level':[], Senior:[] };
  filtered.forEach(r => { if (byLevel[r.level]) byLevel[r.level].push(r); });

  ['entry', 'mid', 'senior'].forEach(k => {
    const lk = k === 'entry' ? 'Entry' : k === 'mid' ? 'Mid-Level' : 'Senior';
    if (!byLevel[lk].length) return;
    const cfg = RLABEL[k];

    const wrap = document.createElement('div');
    wrap.className  = 'rlabel';
    wrap.style.left = '50%';
    wrap.style.top  = (50 - cfg.r) + '%';
    wrap.innerHTML  = `<div class="rlabel-pill ${k}">${cfg.lbl}</div>`
                    + `<div class="rlabel-sub">${cfg.sub}</div>`;
    $rl.appendChild(wrap);
  });

  // ── 4. Station dots ─────────────────────────────────
  const byCat = {};
  filtered.forEach(r => {
    const c = r.category || 'Other';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(r);
  });

  cats.forEach((cat, ci) => {
    const catRoles = byCat[cat] || [];
    if (!catRoles.length) return;
    const a0 = -Math.PI / 2 + ci * sliceAngle;
    const a1 = a0 + sliceAngle;

    const byLv = { Entry:[], 'Mid-Level':[], Senior:[] };
    catRoles.forEach(r => { if (byLv[r.level]) byLv[r.level].push(r); });

    ['Entry', 'Mid-Level', 'Senior'].forEach(lk => {
      const lRoles = byLv[lk];
      if (!lRoles.length) return;
      const k    = lk === 'Entry' ? 'entry' : lk === 'Mid-Level' ? 'mid' : 'senior';
      const band = BANDS[k];

      lRoles.forEach((role, idx) => {
        const t       = (idx + 1) / (lRoles.length + 1);
        const angle   = a0 + t * (a1 - a0);
        const jitter  = hash01(role.id + k);
        // Entry roles cluster tightly near center; mid/senior spread more
        const spread  = k === 'entry' ? 0.40 : 0.75;
        const r       = band.rMin + (0.3 + jitter * spread) * (band.rMax - band.rMin);
        const pos     = polar(cx, cy, r, angle);

        positions[role.id] = { x: pos.x, y: pos.y };

        const el = document.createElement('div');
        el.className  = `dot ${k}`;
        el.dataset.id = role.id;
        el.style.left = pos.x + '%';
        el.style.top  = pos.y + '%';
        el.innerHTML  = `<div class="dot-circle"></div><div class="dot-tip">${role.title}</div>`;
        el.addEventListener('click', () => openPanel(role));
        $st.appendChild(el);
      });
    });
  });

  // ── 5. Connection lines (hidden until a dot is clicked) ──
  filtered.forEach(role => {
    if (!role.connections?.length) return;
    const src = positions[role.id];
    if (!src) return;

    role.connections.forEach(cid => {
      const tgt    = positions[cid];
      if (!tgt) return;
      const tRole  = roles.find(r => r.id === cid);
      if (!tRole) return;
      const k      = tRole.level === 'Entry' ? 'entry' : tRole.level === 'Mid-Level' ? 'mid' : 'senior';

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
      line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
      line.setAttribute('class', `cline ${k}`);
      line.dataset.src = role.id;
      line.dataset.tgt = cid;
      $lines.appendChild(line);
    });
  });
}

// ── DETAILS PANEL ────────────────────────────────────
function openPanel(role) {
  // Highlight connected lines
  document.querySelectorAll('.cline').forEach(l => {
    l.classList.toggle('on', l.dataset.src === role.id || l.dataset.tgt === role.id);
  });
  // Mark selected dot
  document.querySelectorAll('.dot').forEach(d => {
    d.classList.toggle('sel', d.dataset.id === role.id);
  });

  const k = role.level === 'Entry' ? 'entry' : role.level === 'Mid-Level' ? 'mid' : 'senior';

  document.getElementById('panelTop').innerHTML =
    `<div class="panel-badge ${k}">${role.level}</div>`
  + `<div class="panel-title">${role.title}</div>`;

  const skillsHTML = (role.skills || []).length
    ? `<div class="skills-wrap">${role.skills.map(s => `<span class="skill-chip">${s}</span>`).join('')}</div>`
    : '<p>—</p>';

  const pathsHTML = role.connections?.length
    ? `<ul class="plist">${
        role.connections.map(id => {
          const cr = roles.find(r => r.id === id);
          return cr
            ? `<li class="link" onclick="openPanel(roles.find(r=>r.id==='${id}'))">${cr.title}</li>`
            : '';
        }).join('')
      }</ul>`
    : '<p style="font-size:13px;color:var(--label3)">No direct paths listed</p>';

  document.getElementById('panelBody').innerHTML = `
    <div class="prow">
      <div class="prow-label">Category</div>
      <p>${role.category} · ${role.level}</p>
    </div>
    <div class="prow">
      <div class="prow-label">Salary Range</div>
      <p>${role.salary || '—'}</p>
    </div>
    <div class="prow">
      <div class="prow-label">About this role</div>
      <p>${role.description || '—'}</p>
    </div>
    <div class="prow">
      <div class="prow-label">Education</div>
      <p>${role.education || '—'}</p>
    </div>
    <div class="prow">
      <div class="prow-label">Skills</div>
      ${skillsHTML}
    </div>
    <div class="prow">
      <div class="prow-label">Career paths from here</div>
      ${pathsHTML}
    </div>
  `;

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('sel'));
  document.querySelectorAll('.cline').forEach(l => l.classList.remove('on'));
}

// ── FILTERS ──────────────────────────────────────────
function doFilter() {
  const s = filt.search.toLowerCase();
  filtered = roles.filter(r => {
    if (filt.level    !== 'all' && r.level    !== filt.level)    return false;
    if (filt.category !== 'all' && r.category !== filt.category) return false;
    if (s && !r.title.toLowerCase().includes(s) && !(r.description||'').toLowerCase().includes(s)) return false;
    return true;
  });
  layout();
}

function setF(type, val) {
  filt[type] = val;
  document.querySelectorAll(`[data-f="${type}"]`).forEach(e => e.classList.remove('on'));
  document.querySelector(`[data-f="${type}"][data-v="${val}"]`)?.classList.add('on');
  doFilter();
}

function toggleFP() {
  document.getElementById('fp').classList.toggle('open');
  document.getElementById('filterBtn').classList.toggle('on');
}

document.getElementById('searchInput').addEventListener('input', e => {
  filt.search = e.target.value;
  doFilter();
});

// Expose for inline onclick handlers
window.roles      = roles;
window.openPanel  = openPanel;
window.loadData   = loadData;
window.setF       = setF;
window.toggleTheme= toggleTheme;

window.addEventListener('load', loadData);

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (filtered.length) layout(); }, 180);
});
</script>
</body>
